name: Metrics
on:
  # 🌏 Think about the planet! No need to update stats too frequently
  #  Plugins: https://github.com/lowlighter/metrics/tree/master/source/plugins
  #  To do: repositories, pagespeed?
  schedule: [{cron: "0 16 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 📊 Github-metrics
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "📊 github-metrics.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Amsterdam
          base_indepth: yes
          output_action: gist
          plugin_languages: yes
          plugin_languages_ignored: >-
             html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

      - name: 🎵 Spotify - Top tracks
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "🎵 Spotify - Top tracks.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Europe/Amsterdam
          config_order: music
          output_action: gist
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: top
          plugin_music_token: "${{ secrets.CLIENT_ID }}, ${{ secrets.CLIENT_SECRET }}, ${{ secrets.REFRESH_TOKEN }}"
          plugin_music_time_range: long
          plugin_music_top_type: tracks
          plugin_music_limit: 5

      - name: 🎵 Spotify - Recently listened
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "🎵 Spotify - Recently listened.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Europe/Amsterdam
          output_action: gist
          # NOTE: this step may still fail with 'Insufficient client scope' — to fix,
          # re-authorize your Spotify app with the 'user-read-recently-played' scope
          # and regenerate your REFRESH_TOKEN
          plugin_music: yes
          plugin_music_provider: spotify
          plugin_music_mode: recent
          plugin_music_token: "${{ secrets.CLIENT_ID }}, ${{ secrets.CLIENT_SECRET }}, ${{ secrets.REFRESH_TOKEN }}"
          plugin_music_played_at: yes

      - name: 🎵 Spotify - Top artists
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "🎵 Spotify - Top artists.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Europe/Amsterdam
          config_order: music
          output_action: gist
          plugin_music: yes
          plugin_music_mode: top
          plugin_music_provider: spotify
          plugin_music_token: "${{ secrets.CLIENT_ID }}, ${{ secrets.CLIENT_SECRET }}, ${{ secrets.REFRESH_TOKEN }}"
          plugin_music_time_range: long
          plugin_music_top_type: artists
          plugin_music_limit: 5

      - name: 🏆 Achievements
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "🏆 achievements.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Europe/Amsterdam
          output_action: gist
          config_order: achievements
          plugin_achievements: yes
          plugin_achievements_display: compact

      - name: 💡 Coding habits
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "💡 coding-habits.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Europe/Amsterdam
          output_action: gist
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

      - name: ⏱️ Google PageSpeed
        if: ${{ success() || failure() }}
        uses: martijnlindeman/metrics@master
        with:
          filename: "⏱️ Google PageSpeed.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_timezone: Europe/Amsterdam
          output_action: gist
          plugin_pagespeed: yes
          plugin_pagespeed_screenshot: yes
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_url: https://www.martijn-lindeman.com/
