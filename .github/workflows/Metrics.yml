name: Metrics

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📊 Github-metrics
        uses: martijnlindeman/metrics@latest
        with:
          filename: "📊 github-metrics.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          template: classic
          base: header, activity, community, repositories, metadata, languages, notable, discussions, topics
          config_timezone: Europe/London
          base_indepth: yes
          output_action: gist
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 4
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons

      - name: ⚡ Recent activity
        uses: martijnlindeman/metrics@latest
        with:
          filename: "⚡ recent-activity.svg"
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          config_order: stars, activity
          output_action: gist
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 300
          plugin_activity_visibility: all
          plugin_stars: yes
          plugin_stars_limit: 3
